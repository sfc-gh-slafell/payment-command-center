name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: ruff check
        run: ruff check generator/ fallback_ingest/ app/backend/

  typescript-lint:
    name: TypeScript Lint (eslint + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: app/frontend/package.json
      - run: npm install
        working-directory: app/frontend
      - name: TypeScript compile check
        run: npx tsc --noEmit
        working-directory: app/frontend

  sql-lint:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sqlfluff sqlfluff-templater-dbt
      - name: sqlfluff lint dbt models
        run: sqlfluff lint dbt/models/ --dialect snowflake || true
      - name: sqlfluff lint schemachange
        run: sqlfluff lint schemachange/ --dialect snowflake || true

  kafka-config-validation:
    name: Kafka Connect Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: python -m json.tool kafka-connect/shared.json > /dev/null

  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-snowflake
      - name: dbt deps
        run: dbt deps
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
      - name: dbt compile (no execution)
        run: dbt compile --profiles-dir . --no-populate-cache || echo "Compile skipped (no Snowflake in CI)"
        working-directory: dbt

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -f app/Dockerfile app/ -t payment-command-center:ci
      - name: Build generator image
        run: docker build -f generator/Dockerfile generator/ -t payment-generator:ci
