name: Deploy

on:
  workflow_dispatch:

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_key.p8
  REGISTRY_HOST: ${{ secrets.SNOWFLAKE_REGISTRY_HOST }}

jobs:
  terraform-apply:
    name: 1. Terraform Apply
    runs-on: ubuntu-latest
    env:
      TF_VAR_snowflake_organization_name: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}
      TF_VAR_snowflake_account_name: ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
      TF_VAR_snowflake_user: ${{ secrets.SNOWFLAKE_USER }}
      TF_VAR_snowflake_private_key: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8
      - name: Restore Terraform state cache
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref_name }}
          restore-keys: terraform-state-
      - name: terraform init
        run: terraform init
        working-directory: terraform/
      - name: terraform apply
        run: terraform apply -auto-approve -input=false
        working-directory: terraform/
      - name: Save Terraform state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref_name }}-${{ github.run_id }}

  schemachange-deploy:
    name: 2. schemachange Deploy
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install schemachange
      - run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8
      - name: schemachange deploy
        run: schemachange deploy
        working-directory: schemachange
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}-${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_AUTHENTICATOR: snowflake_jwt
          SNOWFLAKE_PRIVATE_KEY_PATH: /tmp/snowflake_key.p8

  dbt-run:
    name: 3. dbt Run + Test
    runs-on: ubuntu-latest
    needs: schemachange-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-snowflake
      - run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8
      - name: dbt deps
        run: dbt deps
        working-directory: dbt
      - name: dbt run
        run: dbt run --profiles-dir .
        working-directory: dbt
      - name: dbt test
        run: dbt test --profiles-dir .
        working-directory: dbt

  docker-push:
    name: 4. Docker Build + Push to Registry
    runs-on: ubuntu-latest
    needs: terraform-apply
    env:
      IMAGE_TAG: ${{ github.sha }}
      REGISTRY_HOST: ${{ format('{0}-{1}.registry.snowflakecomputing.com', secrets.SNOWFLAKE_ORGANIZATION_NAME, secrets.SNOWFLAKE_ACCOUNT_NAME) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install snowflake-cli
      - run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8
      - name: Configure snow CLI connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml <<EOF
          [default]
          organization_name = "${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          account_name = "${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "/tmp/snowflake_key.p8"
          role = "PAYMENTS_ADMIN_ROLE"
          warehouse = "PAYMENTS_ADMIN_WH"
          EOF
          chmod 0600 ~/.snowflake/connections.toml
      - name: Docker login to Snowflake registry
        run: snow spcs image-registry login --connection default
      - name: Build and push app image
        run: |
          docker build -f app/Dockerfile app/ \
            -t "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-command-center:${IMAGE_TAG}" \
            -t "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-command-center:latest"
          docker push "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-command-center:${IMAGE_TAG}"
          docker push "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-command-center:latest"
      - name: Build and push generator image
        run: |
          docker build -f generator/Dockerfile generator/ \
            -t "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-generator:${IMAGE_TAG}" \
            -t "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-generator:latest"
          docker push "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-generator:${IMAGE_TAG}"
          docker push "${REGISTRY_HOST}/payments_db/app/dashboard_repo/payment-generator:latest"

  spcs-deploy:
    name: 5. SPCS Service Deploy
    runs-on: ubuntu-latest
    needs: docker-push
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install snowflake-cli
      - run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8
      - name: Configure snow CLI connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml <<EOF
          [default]
          organization_name = "${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          account_name = "${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "/tmp/snowflake_key.p8"
          role = "PAYMENTS_APP_ROLE"
          warehouse = "PAYMENTS_ADMIN_WH"
          EOF
          chmod 0600 ~/.snowflake/connections.toml
      - name: Deploy SPCS service
        run: snow spcs service create PAYMENT_DASHBOARD --spec-path spcs/service_spec.yaml --compute-pool PAYMENTS_DASHBOARD_POOL --database PAYMENTS_DB --schema APP

  kafka-connector-deploy:
    name: 6. Kafka Connector Deploy
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4
      - name: Deploy HP connector
        run: |
          if [ -z "${KAFKA_CONNECT_URL}" ]; then
            echo "KAFKA_CONNECT_URL not configured — skipping connector deploy (requires live Kafka infrastructure)"
            exit 0
          fi
          curl -f -X POST "${KAFKA_CONNECT_URL}/connectors" \
            -H "Content-Type: application/json" \
            -d @kafka-connect/shared.json
        env:
          KAFKA_CONNECT_URL: ${{ secrets.KAFKA_CONNECT_URL }}
          SNOWFLAKE_URL: ${{ secrets.SNOWFLAKE_URL }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_BASE64 }}
