services:
  kafka:
    image: apache/kafka:4.0.2
    container_name: payments-kafka
    ports:
      - "9092:9092"
    volumes:
      # Bind mount keeps logs on host disk — avoids filling the container's overlay2 layer.
      # To wipe and start fresh: rm -rf ./kafka-data
      - ./kafka-data:/tmp/kraft-logs
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Message size limits (10 MB default, prevents memory issues)
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 10485760
      # Log retention — prevent disk fill at 38k+ rps (200 MB/partition × 48 partitions = ~9.6 GB max)
      KAFKA_LOG_RETENTION_MS: "3600000"               # 1 hour max age
      KAFKA_LOG_RETENTION_BYTES: "209715200"          # 200 MB per partition
      KAFKA_LOG_SEGMENT_BYTES: "10485760"             # 10 MB segments for timely cleanup
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "30000"  # Check every 30s

  kafka-init:
    # One-shot container: waits for Kafka, creates topics with 48 partitions, exits 0.
    # Connect workers depend on this completing before they start.
    image: apache/kafka:4.0.2
    container_name: payments-kafka-init
    depends_on:
      - kafka
    command:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Kafka broker to be ready..."
        until /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:29092 --list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Broker ready. Creating topics (48 partitions each)..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic payments.auth --partitions 48 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic payments.auth.v3 --partitions 48 --replication-factor 1
        echo "Topics ready."
    restart: "no"

  kafka-connect:
    build:
      context: kafka-connect
      dockerfile: Dockerfile
    container_name: payments-kafka-connect
    ports:
      - "8083:8083"
    environment:
      # Kafka broker — use internal listener (kafka:29092) for container-to-container traffic
      CONNECT_BOOTSTRAP_SERVERS: "kafka:29092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_REST_PORT: 8083
      # Consumer group for this Connect cluster
      CONNECT_GROUP_ID: "snowflake-connector-group"
      # Internal Connect bookkeeping topics (replication 1 = single-node broker)
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-configs"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-offsets"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-status"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      # Default converters (overridden per-connector in shared.json)
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      # Snowflake credentials — sourced from .env file (see .env.example)
      SNOWFLAKE_URL: "${SNOWFLAKE_URL}"
      SNOWFLAKE_USER: "${SNOWFLAKE_USER}"
      SNOWFLAKE_PRIVATE_KEY: "${SNOWFLAKE_PRIVATE_KEY}"
      # Enable environment variable substitution in connector configs
      CONNECT_CONFIG_PROVIDERS: "env"
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: "org.apache.kafka.common.config.provider.EnvVarConfigProvider"
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  kafka-connect-v3:
    build:
      context: kafka-connect-v3
      dockerfile: Dockerfile
    container_name: payments-kafka-connect-v3
    ports:
      - "8084:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:29092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect-v3"
      CONNECT_REST_PORT: 8083
      # Separate consumer group from V4 HP connector cluster
      CONNECT_GROUP_ID: "snowflake-connector-v3-group"
      # Separate internal bookkeeping topics from V4 cluster
      CONNECT_CONFIG_STORAGE_TOPIC: "_connect-v3-configs"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_TOPIC: "_connect-v3-offsets"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_TOPIC: "_connect-v3-status"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      SNOWFLAKE_URL: "${SNOWFLAKE_URL}"
      SNOWFLAKE_USER: "${SNOWFLAKE_USER}"
      SNOWFLAKE_PRIVATE_KEY: "${SNOWFLAKE_PRIVATE_KEY}"
      CONNECT_CONFIG_PROVIDERS: "env"
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: "org.apache.kafka.common.config.provider.EnvVarConfigProvider"
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  generator:
    build:
      context: generator
      dockerfile: Dockerfile
    container_name: payments-generator
    ports:
      - "8001:8000"
    environment:
      # Kafka connection — use internal listener for container-to-container traffic
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC: "payments.auth"
      # Generator defaults (can be changed via API).
      # 50000 rps exceeds V3 Classic's single-task Java SDK ceiling. V4 HP
      # (tasks.max=4, Rust client) handles 12,500 rps/task with ease; V3
      # (tasks.max=1, Java SDK) accumulates unbounded Kafka consumer lag,
      # making the throughput and pipeline-lag gap visible in the dashboard.
      GENERATOR_RATE: "50000"
      GENERATOR_ENV: "dev"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
