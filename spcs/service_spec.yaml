spec:
  containers:
    - name: dashboard
      image: /PAYMENTS_DB/APP/DASHBOARD_REPO/payment-command-center:20260409-110420
      env:
        SNOWFLAKE_WAREHOUSE: PAYMENTS_INTERACTIVE_WH
        SNOWFLAKE_DATABASE: PAYMENTS_DB
        SNOWFLAKE_SCHEMA_SERVE: SERVE
        SNOWFLAKE_SCHEMA_RAW: RAW
        APP_PORT: "8080"
      readinessProbe:
        port: 8080
        path: /health
      resources:
        requests:
          memory: 1Gi
          cpu: "1"
        limits:
          memory: 2Gi
          cpu: "2"

  endpoints:
    - name: dashboard
      port: 8080
      public: true
