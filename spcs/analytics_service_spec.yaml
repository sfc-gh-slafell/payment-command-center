spec:
  containers:
    - name: analytics
      image: /PAYMENTS_DB/APP/DASHBOARD_REPO/payment-analytics:20260401-135608
      env:
        SNOWFLAKE_WAREHOUSE: PAYMENTS_REFRESH_WH
        SNOWFLAKE_DATABASE: PAYMENTS_DB
        SNOWFLAKE_SCHEMA: CURATED
        APP_PORT: "8501"
      readinessProbe:
        port: 8501
        path: /_stcore/health
      resources:
        requests:
          memory: 512Mi
          cpu: "0.5"
        limits:
          memory: 1Gi
          cpu: "1"

  endpoints:
    - name: analytics
      port: 8501
      public: true
